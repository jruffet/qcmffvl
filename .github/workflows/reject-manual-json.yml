name: Reject manual MCQ json edits

on:
  push:
    paths:
      - 'web/json/qcm_ffvl.json'
  pull_request:
    paths:
      - 'web/json/qcm_ffvl.json'

jobs:
  reject-manual-json-edits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for manual qcm_ffvl.json edits
        run: |
          # Handle empty before SHA (initial commit)
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit to diff, skipping check"
            exit 0
          fi

          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^web/json/qcm_ffvl.json'; then
            if [ "${{ github.actor }}" != "github-actions[bot]" ]; then
              echo "Manual changes to /web/json/qcm_ffvl.json detected from ${{ github.actor }}"
              exit 1
            fi
          fi
