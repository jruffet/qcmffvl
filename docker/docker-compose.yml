services:
  qcmffvl:
    container_name: qcmffvl
    hostname: qcmffvl
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # --- Root configuration files ---
      - ../package.json:/app/package.json
      - ../package-lock.json:/app/package-lock.json
      - ../vite.config.js:/app/vite.config.js
      - ../eslint.config.js:/app/eslint.config.js
      - ../.prettierrc.json:/app/.prettierrc.json
      - ../pyproject.toml:/app/pyproject.toml
      - ../requirements.txt:/app/requirements.txt

      # --- Source directories ---
      - ../data:/app/data
      - ../scripts:/app/scripts
      - ../web:/app/web

      # --- Persistent volumes ---
      - qcmffvl_node_modules:/app/node_modules
      - qcmffvl_dist:/app/dist
      - qcmffvl_generated:/app/web/generated

volumes:
  qcmffvl_node_modules:
  qcmffvl_dist:
  qcmffvl_generated:
